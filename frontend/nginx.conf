server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;
  add_header Content-Security-Policy "upgrade-insecure-requests; block-all-mixed-content" always;

  # trailing slash 경로 통일
  location = /grad {
    return 301 /grad/;
  }

  location = /grad/courses {
    return 301 /grad/courses/;
  }

  location = /grad/status {
    return 301 /grad/status/;
  }

  location = /storage {
    return 301 /storage/;
  }

  location = /profile {
    return 301 /profile/;
  }

  location = /error {
    return 301 /error/;
  }

  # 해시된 빌드 자산은 파일명이 바뀌므로 장기 캐시 허용
  location ^~ /assets/ {
    add_header Content-Security-Policy "upgrade-insecure-requests; block-all-mixed-content" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # HTML 진입점은 항상 재검증해서 최신 해시 자산 경로를 받도록 설정
  location / {
    add_header Content-Security-Policy "upgrade-insecure-requests; block-all-mixed-content" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri $uri/ =404;
  }
}

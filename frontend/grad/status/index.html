<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Graduation Manager | Status</title>
  </head>
  <body data-page="grad-status">
    <div class="page-shell" data-app-shell>
      <div data-header-root></div>
      <main class="page-main">
        <div class="container page-section">
          <section class="status-page" data-page-root>
            <header class="page-header status-page__header">
              <div class="tutorial-entry" data-tutorial="status-title">
                <h1 class="page-title">졸업 현황</h1>
              </div>
              <div class="tutorial-entry__subrow">
                <p class="page-subtitle status-page__subtitle tutorial-entry__subtitle">
                  상세 졸업 판정 결과를 확인할 수 있습니다.
                </p>
                <button class="btn btn--ghost tutorial-entry__button" type="button" data-tutorial-trigger="status">
                  튜토리얼 보기
                </button>
              </div>
            </header>

            <div class="status-primary-stack" data-status-primary-shell>
              <section class="card status-summary-card" data-tutorial="status-overall-card">
                <div class="status-summary-card__top">
                  <div class="status-summary-card__left">
                    <h2 class="status-summary-card__title">전체 현황</h2>
                    <span class="badge badge--red status-summary-card__badge" data-status-summary-badge
                      >판정 준비 중</span
                    >
                  </div>

                  <div class="status-summary-card__right">
                    <p class="status-summary-card__score">
                      <span data-status-summary-earned>--</span>/<span data-status-summary-required>--</span>
                    </p>
                    <p class="status-summary-card__label">총 취득 학점</p>
                  </div>
                </div>

                <div class="status-applied-card">
                  <div class="status-applied-card__group">
                    <p class="status-applied-card__label">학부</p>
                    <div class="status-badge-row">
                      <span class="badge badge--blue" data-status-department-badge>미설정</span>
                    </div>
                  </div>

                  <div class="status-applied-card__group">
                    <p class="status-applied-card__label">템플릿</p>
                    <div class="status-badge-row">
                      <span class="badge badge--blue" data-status-template-badge>미설정</span>
                    </div>
                  </div>

                  <div class="status-applied-card__group">
                    <p class="status-applied-card__label">전공</p>
                    <div class="status-badge-row" data-status-major-type-badges>
                      <span class="badge">전공 미설정</span>
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <div class="status-page__body" data-status-body></div>

            <section
              class="status-micro-major-section"
              data-micro-major-section
              aria-labelledby="micro-major-section-title"
            >
              <div class="status-section-heading">
                <div class="status-section-heading__copy">
                  <h2 class="status-section-heading__title" id="micro-major-section-title">마이크로전공 이수 현황</h2>
                  <p class="status-section-heading__description">이수 가능 대상 마이크로전공의 진행 상태입니다.</p>
                  <p class="status-section-heading__warning">
                    과학기술과 에콜로지, 인권과 평화를 제외한 과목은 2024년 2학기 이후 이수내역부터 반영됩니다.
                  </p>
                </div>
              </div>

              <div class="status-micro-major-state" data-micro-major-state hidden></div>

              <div class="status-micro-major-grid" data-micro-major-grid></div>
            </section>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/scripts/pages/grad/status/index.js"></script>
  </body>
</html>

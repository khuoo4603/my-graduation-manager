<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Graduation Manager | Status</title>
  </head>
  <body data-page="grad-status">
    <div class="page-shell" data-app-shell>
      <div data-header-root></div>
      <main class="page-main">
        <div class="container page-section">
          <section class="status-page" data-page-root>
            <header class="page-header status-page__header">
              <h1 class="page-title">Graduation Status</h1>
              <p class="page-subtitle status-page__subtitle">상세 졸업 판정 결과를 확인할 수 있습니다.</p>
            </header>

            <div class="status-primary-stack" data-status-primary-shell>
              <section class="card status-summary-card">
                <div class="status-summary-card__top">
                  <div class="status-summary-card__left">
                    <h2 class="status-summary-card__title">Overall Status</h2>
                    <span class="badge badge--red status-summary-card__badge" data-status-summary-badge
                      >판정 준비 중</span
                    >
                  </div>

                  <div class="status-summary-card__right">
                    <p class="status-summary-card__score">
                      <span data-status-summary-earned>--</span>/<span data-status-summary-required>--</span>
                    </p>
                    <p class="status-summary-card__label">총 취득 학점</p>
                  </div>
                </div>

                <div class="status-applied-card">
                  <div class="status-applied-card__group">
                    <p class="status-applied-card__label">학부</p>
                    <div class="status-badge-row">
                      <span class="badge badge--blue" data-status-department-badge>미설정</span>
                    </div>
                  </div>

                  <div class="status-applied-card__group">
                    <p class="status-applied-card__label">템플릿</p>
                    <div class="status-badge-row">
                      <span class="badge badge--blue" data-status-template-badge>미설정</span>
                    </div>
                  </div>

                  <div class="status-applied-card__group">
                    <p class="status-applied-card__label">전공</p>
                    <div class="status-badge-row" data-status-major-type-badges>
                      <span class="badge">전공 미설정</span>
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <div class="status-page__body" data-status-body></div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/scripts/pages/grad/status/index.js"></script>
  </body>
</html>

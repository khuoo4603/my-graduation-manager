<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/src/assets/logos/skhu_track_logo.png" />
    <title>SKHU Track | Profile</title>
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/components.css" />
    <link rel="stylesheet" href="/src/styles/pages/profile.css" />
  </head>
  <body data-page="profile">
    <div class="page-shell" data-app-shell>
      <div data-header-root></div>
      <main class="page-main">
        <div class="container page-section">
          <section class="profile-page" data-page-root>
            <header class="profile-page__header">
              <div class="tutorial-entry" data-tutorial="profile-title">
                <h1 class="profile-page__title">프로필</h1>
              </div>
              <div class="tutorial-entry__subrow">
                <p class="profile-page__subtitle tutorial-entry__subtitle">
                  사용자 정보 확인과 학부, 졸업 템플릿, 전공 변경이 가능합니다.
                </p>
                <button class="btn btn--ghost tutorial-entry__button" type="button" data-tutorial-trigger="profile">
                  튜토리얼 보기
                </button>
              </div>
            </header>

            <section class="card profile-card" data-tutorial="profile-user-card">
              <div class="profile-card__header">
                <h2 class="profile-card__title">사용자 정보</h2>
              </div>

              <div class="profile-field-stack">
                <label class="field">
                  <span class="field__label">이름</span>
                  <input class="input" type="text" maxlength="50" data-profile-name-input />
                </label>

                <div class="field">
                  <span class="field__label">이메일</span>
                  <div class="profile-value" data-profile-email>해당 없음</div>
                </div>
              </div>

              <div class="profile-card__actions">
                <button class="btn btn--secondary" type="button" data-profile-name-cancel>취소</button>
                <button class="btn btn--primary" type="button" data-profile-name-save>저장</button>
              </div>

              <p class="profile-feedback" data-profile-name-feedback hidden aria-live="polite"></p>
            </section>

            <section class="card profile-card" data-tutorial="profile-template-card">
              <div class="profile-card__header">
                <h2 class="profile-card__title">학부 및 템플릿</h2>
              </div>

              <div class="profile-field-stack">
                <label class="field">
                  <span class="field__label">학부</span>
                  <select class="select" data-department-select>
                    <option value="" selected disabled>학부를 선택해 주세요.</option>
                  </select>
                </label>

                <label class="field">
                  <span class="field__label">졸업 템플릿</span>
                  <select class="select" data-template-select>
                    <option value="" selected disabled>졸업 템플릿을 선택해 주세요.</option>
                  </select>
                </label>
              </div>

              <div class="profile-card__actions" data-tutorial="profile-save-area">
                <button class="btn btn--secondary" type="button" data-base-settings-cancel>취소</button>
                <button class="btn btn--primary" type="button" data-base-settings-save>저장</button>
              </div>

              <p class="profile-feedback" data-base-settings-feedback hidden aria-live="polite"></p>
            </section>

            <section class="card profile-card" data-tutorial="profile-major-card">
              <div class="profile-card__header">
                <h2 class="profile-card__title">전공</h2>
              </div>

              <div class="profile-major-builder">
                <label class="field">
                  <span class="field__label">학부 필터</span>
                  <select class="select" data-major-department-select>
                    <option value="" selected disabled>학부를 선택해 주세요.</option>
                  </select>
                </label>

                <label class="field">
                  <span class="field__label">전공</span>
                  <select class="select" data-major-select>
                    <option value="" selected disabled>전공을 선택해 주세요.</option>
                  </select>
                </label>

                <label class="field">
                  <span class="field__label">전공 구분</span>
                  <select class="select" data-major-type-select>
                    <option value="심화전공">심화전공</option>
                    <option value="주전공">주전공</option>
                    <option value="부전공">부전공</option>
                    <option value="복수전공" selected>복수전공</option>
                  </select>
                </label>

                <div class="profile-major-builder__action">
                  <button class="btn btn--primary" type="button" data-major-add>
                    <img class="btn__icon-image" src="/src/assets/icons/fluent/add_24_regular.svg" alt="" aria-hidden="true" />
                    <span>전공 추가</span>
                  </button>
                </div>
              </div>

              <p class="profile-empty" data-major-empty hidden>등록된 전공이 없습니다.</p>
              <ul class="profile-major-list" data-major-list></ul>

              <div class="profile-card__actions">
                <button class="btn btn--secondary" type="button" data-major-cancel>취소</button>
                <button class="btn btn--primary" type="button" data-major-save>저장</button>
              </div>

              <p class="profile-feedback" data-major-feedback hidden aria-live="polite"></p>
            </section>

            <section class="card profile-card profile-danger-card" data-tutorial="profile-account-delete">
              <div class="profile-danger-card__header">
                <span class="profile-danger-card__icon" aria-hidden="true">
                  <img src="/src/assets/icons/fluent/warning_24_regular.svg" alt="" />
                </span>
                <div class="profile-danger-card__copy">
                  <h2 class="profile-card__title">계정 삭제</h2>
                  <p class="profile-danger-card__description">
                    계정을 삭제하면 관련 데이터가 함께 제거됩니다. 이 작업은 되돌릴 수 없습니다.
                  </p>
                </div>
              </div>

              <div class="profile-danger-card__actions">
                <button class="btn btn--danger profile-danger-card__button" type="button" data-account-delete-open>
                  계정 삭제하기
                </button>
              </div>
            </section>

            <div class="profile-modal" data-account-delete-modal hidden>
              <div class="profile-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="account-delete-modal-title">
                <div class="profile-modal__header">
                  <span class="profile-modal__icon" aria-hidden="true">
                    <img src="/src/assets/icons/fluent/warning_24_regular.svg" alt="" />
                  </span>
                  <h2 class="profile-modal__title" id="account-delete-modal-title">계정을 삭제하시겠습니까?</h2>
                </div>

                <p class="profile-modal__description">
                  이 작업은 되돌릴 수 없습니다. 모든 데이터가 영구적으로 삭제됩니다.
                </p>

                <div class="profile-modal__actions">
                  <button class="btn btn--secondary" type="button" data-account-delete-cancel>취소</button>
                  <button class="btn btn--danger profile-modal__delete" type="button" data-account-delete-confirm>
                    삭제하기
                  </button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/scripts/pages/profile/index.js"></script>
  </body>
</html>

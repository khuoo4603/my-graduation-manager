name: "Frontend PROD Deploy (Manual + Approval)"

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: frontend-prod-deploy
  cancel-in-progress: false

jobs:
  build-push-and-bump:
    runs-on: ubuntu-latest
    environment: prod
    env:
      IMAGE_NAME: ghcr.io/khuoo4603/my-graduation-manager-frontend
      VITE_API_BASE_URL: https://api.khuoo.synology.me
      VITE_APP_ENV: prod

    steps:
      - name: Checkout (with PAT)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GHCR_PAT }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (Vite prod)
        working-directory: frontend
        run: VITE_API_BASE_URL="${VITE_API_BASE_URL}" VITE_APP_ENV="${VITE_APP_ENV}" npm run build:prod

      - name: Resolve image tag from checkout SHA
        id: vars
        run: |
          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="${FULL_SHA:0:7}"

          if [ -z "$SHORT_SHA" ]; then
            echo "SHORT_SHA is empty. Abort."
            exit 1
          fi

          echo "$SHORT_SHA" | grep -E '^[0-9a-f]{7}$' >/dev/null || (echo "Invalid short SHA format"; exit 1)
          echo "FULL_SHA=${FULL_SHA}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Using IMAGE_TAG=sha-${SHORT_SHA}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_APP_ENV=${{ env.VITE_APP_ENV }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.vars.outputs.FULL_SHA }}

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.7.1"

      - name: Update prod overlay image tag
        working-directory: infra/k8s/frontend/overlays/prod
        run: |
          kustomize edit set image ${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}
          echo "---- kustomization.yaml (after) ----"
          cat kustomization.yaml
          grep -n "newTag" kustomization.yaml || true

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add infra/k8s/frontend/overlays/prod/kustomization.yaml
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "infra(frontend): prod image ${{ steps.vars.outputs.IMAGE_TAG }} [skip ci]"
          git push origin main

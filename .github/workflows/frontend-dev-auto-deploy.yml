name: Frontend DEV Auto Deploy

on:
  workflow_run:
    workflows: ["Frontend CI (Build & Push to GHCR)"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: frontend-dev-auto-deploy
  cancel-in-progress: true

jobs:
  bump-dev-image-tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with PAT)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GHCR_PAT }}

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.7.1"

      - name: Compute image tag from CI head_sha
        id: tag
        run: |
          FULL_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${FULL_SHA:0:7}"

          if [ -z "$SHORT_SHA" ]; then
            echo "SHORT_SHA is empty. Abort."
            exit 1
          fi

          echo "IMAGE_TAG=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Using IMAGE_TAG=sha-${SHORT_SHA}"

      - name: Update dev overlay image tag
        working-directory: infra/k8s/frontend/overlays/dev
        run: |
          kustomize edit set image ghcr.io/khuoo4603/my-graduation-manager-frontend=ghcr.io/khuoo4603/my-graduation-manager-frontend:${{ steps.tag.outputs.IMAGE_TAG }}
          echo "---- kustomization.yaml (after) ----"
          cat kustomization.yaml
          grep -n "newTag" kustomization.yaml || true

      - name: Commit & push (dev)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add infra/k8s/frontend/overlays/dev/kustomization.yaml
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "infra(frontend): dev image ${{ steps.tag.outputs.IMAGE_TAG }} [skip ci]"
          git push origin main

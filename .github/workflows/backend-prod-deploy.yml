name: "Backend PROD Deploy (Manual + Approval)"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Deploy image tag (ex: sha-51b5eab)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: backend-prod-deploy
  cancel-in-progress: false

jobs:
  bump-image-tag:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout (with PAT)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GHCR_PAT }}

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.7.1"

      - name: Update prod overlay image tag
        working-directory: infra/k8s/backend/overlays/prod
        run: |
          kustomize edit set image ghcr.io/khuoo4603/my-graduation-manager-backend=ghcr.io/khuoo4603/my-graduation-manager-backend:${{ inputs.image_tag }}
          echo "---- kustomization.yaml (after) ----"
          cat kustomization.yaml

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add infra/k8s/backend/overlays/prod/kustomization.yaml
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "infra(backend): prod image ${{ inputs.image_tag }} [skip ci]"
          git push origin main
name: Backend DEV Auto Deploy

on:
  workflow_run:
    workflows: ["Backend CI (Build & Push to GHCR)"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: backend-dev-auto-deploy
  cancel-in-progress: true

jobs:
  bump-dev-image-tag:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout (with PAT)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GHCR_PAT }}

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.7.1"

      - name: Extract short SHA (from CI run commit)
        id: vars
        run: echo "SHA_SHORT=${{ github.event.workflow_run.head_sha }}" | cut -c1-7 | xargs -I{} echo "SHA_SHORT={}" >> $GITHUB_OUTPUT

      - name: Update dev overlay image tag
        working-directory: infra/k8s/backend/overlays/dev
        run: |
          kustomize edit set image ghcr.io/khuoo4603/my-graduation-manager-backend=ghcr.io/khuoo4603/my-graduation-manager-backend:sha-${{ steps.vars.outputs.SHA_SHORT }}
          echo "---- kustomization.yaml (after) ----"
          cat kustomization.yaml

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com]"

          git add infra/k8s/backend/overlays/dev/kustomization.yaml
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "infra(backend): dev image sha-${{ steps.vars.outputs.SHA_SHORT }} [skip ci]"
          git push origin main
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backend

resources:
- ../../base

patchesStrategicMerge:
- deployment-patch.yaml

patches:
- patch: |-
    - op: add
      path: /spec/strategy
      value:
        type: Recreate
  target:
    group: apps
    kind: Deployment
    name: frontend
    version: v1

images:
- name: ghcr.io/khuoo4603/my-graduation-manager-frontend
  newName: ghcr.io/khuoo4603/my-graduation-manager-frontend
  newTag: sha-cef81e3

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backend-dev

resources:
- ../../base

patchesStrategicMerge:
- deployment-patch.yaml
- ingress-patch.yaml

patches:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: frontend
  patch: |-
    - op: add
      path: /spec/strategy
      value:
        type: Recreate

images:
- name: ghcr.io/khuoo4603/my-graduation-manager-frontend
  newName: ghcr.io/khuoo4603/my-graduation-manager-frontend
  newTag: sha-79db697

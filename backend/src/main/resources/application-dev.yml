spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "https://dev-api.khuoo.synology.me/login/oauth2/code/google"

management:
  endpoint:
    health:
      show-details: never

app:
  auth:
    cookie-name: dev_access_token
    cookie-domain: ""
    redirect-url: "https://dev-grad.khuoo.synology.me/grad/"
    allowed-origins:
      - https://dev-grad.khuoo.synology.me
  dev-token:
    enabled: false
  storage:
    root: /mnt/skhutrack-dev
  jwt:
    secret: "${JWT_SECRET}"
    exp-seconds: 604800 # 7일
  swagger:
    server-url: https://dev-api.khuoo.synology.me

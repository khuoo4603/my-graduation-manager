spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/gradmanager
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

management:
  endpoint:
    health:
      show-details: never

app:
  auth:
    redirect-url: https://dev.api.khuoo.synology.me/swagger-ui/index.html
  dev-token:
    enabled: false
  storage:
    root: /mnt/gradmanager-files
  jwt:
    secret: "${JWT_SECRET}"
    exp-seconds: 604800  #7일
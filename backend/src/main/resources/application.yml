spring:
  application:
    name: gradmanager-backend

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID}}
            client-secret: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET}}
            scope: [email, profile]
            redirect-uri: "https://api.khuoo.synology.me/login/oauth2/code/google"
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework

app:
  auth:
    cookie-name: access_token
    cookie-domain: .khuoo.synology.me
    cookie-max-age-seconds: 604800 # 7일
    redirect-url: https://api.khuoo.synology.me/swagger-ui/index.html
    default-department-id: 1

logging:
  level:
    root: INFO
    org.springframework.jdbc.core: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

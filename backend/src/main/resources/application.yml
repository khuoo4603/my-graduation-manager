spring:
    application:
        name: gradmanager-backend

    flyway:
        enabled: true
        locations: classpath:db/migration
        validate-on-migrate: true

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope: [ email, profile ]

server:
    port: 8080
    shutdown: graceful
    forward-headers-strategy: framework

app:
    auth:
        cookie-name: access_token
        cookie-domain: .khuoo.synology.me
        cookie-max-age-seconds: 604800  #7일
        redirect-url: https://api.khuoo.synology.me/swagger-ui/index.html
        default-department-id: 1


logging:
    level:
        root: INFO
        org.springframework.jdbc.core: INFO

management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            probes:
                enabled: true
            show-details: never
    health:
        livenessstate:
            enabled: true
        readinessstate:
            enabled: true
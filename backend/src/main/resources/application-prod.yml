spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "https://api.skhutrack.com/login/oauth2/code/google"

management:
  endpoint:
    health:
      show-details: never

app:
  dev-token:
    enabled: false
  storage:
    root: /mnt/skhutrack-prod
  jwt:
    secret: "${JWT_SECRET}"
    exp-seconds: 604800 # 7일
  auth:
    cookie-domain: .skhutrack.com
    redirect-url: "https://skhutrack.com/grad/"
    allowed-origins:
      - https://skhutrack.com
  swagger:
    server-url: https://api.skhutrack.com

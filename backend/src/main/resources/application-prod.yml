spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

management:
  endpoint:
    health:
      show-details: never

app:
  dev-token:
    enabled: false
  storage:
    root: /mnt/gradmanager-files
  jwt:
    secret: "${JWT_SECRET}"
    exp-seconds: 604800  # 7일
  auth:
    redirect-url: https://api.khuoo.synology.me/swagger-ui/index.html